{% extends "base.html" %}
{% block title %}Nueva Contraseña – Guardian Zero{% endblock %}

{% block extra_head %}
<style>
  body { display: flex; flex-direction: column; }

  .gz-header {
    background: var(--bg-main);
    border-bottom: 1px solid rgba(26,107,115,.2);
    text-align: center;
    padding: 14px;
  }
  .gz-header h1 { font-size: 1.6rem; font-weight: 700; color: var(--navy); }

  .auth-page {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .auth-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    padding: 44px 36px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .auth-logo { height: auto; width: 80px; margin-bottom: 18px; }
  .auth-title { font-size: 1.1rem; font-weight: 700; color: var(--navy); margin-bottom: 26px; }
  .form-actions { margin-top: 22px; }

  /* Password strength indicator */
  .strength-bar {
    height: 4px;
    border-radius: 2px;
    background: #ddd;
    margin-top: -8px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    width: 0%;
    transition: width .3s, background .3s;
    border-radius: 2px;
  }
</style>
{% endblock %}

{% block body %}
<header class="gz-header">
  <h1>Guardian Zero</h1>
</header>

<main class="auth-page">
  <div class="auth-card">
    <img src="{{ url_for('static', filename='img/LOGO_GZ.png') }}" class="auth-logo" alt="Guardian Zero"/>

    <p class="auth-title">Recuperación de contraseña</p>

    <form method="POST" action="{{ url_for('auth.reset_password') }}">
      <div class="input-group">
        <span class="icon">🔒</span>
        <input type="password" name="password" id="newPass"
               placeholder="Contraseña nueva" required autocomplete="new-password" />
      </div>
      <div class="strength-bar">
        <div class="strength-fill" id="strengthFill"></div>
      </div>

      <div class="input-group">
        <span class="icon">🔒</span>
        <input type="password" name="confirm_password"
               placeholder="Confirmar contraseña" required autocomplete="new-password" />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">Ingresar</button>
      </div>
    </form>
  </div>
</main>
{% endblock %}

{% block extra_js %}
<script>
  const passInput = document.getElementById('newPass');
  const fill      = document.getElementById('strengthFill');
  passInput.addEventListener('input', () => {
    const v = passInput.value;
    let score = 0;
    if (v.length >= 8)  score += 25;
    if (/[A-Z]/.test(v)) score += 25;
    if (/[0-9]/.test(v)) score += 25;
    if (/[^A-Za-z0-9]/.test(v)) score += 25;
    fill.style.width = score + '%';
    fill.style.background = score <= 25 ? '#e05252'
                          : score <= 50 ? '#e09c42'
                          : score <= 75 ? '#4fc3cb'
                          :               '#2e9e6e';
  });
</script>
{% endblock %}
