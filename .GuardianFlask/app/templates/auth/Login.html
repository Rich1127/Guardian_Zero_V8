{% extends "base.html" %}
{% block title %}Iniciar Sesión – Guardian Zero{% endblock %}

{% block extra_head %}
<style>
  body { display: flex; flex-direction: column; }

  /* ── Header ── */
  .gz-header {
    background: var(--bg-main);
    border-bottom: 1px solid rgba(26,107,115,.2);
    text-align: center;
    padding: 14px;
  }
  .gz-header h1 {
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: .5px;
  }

  /* ── Page layout ── */
  .auth-page {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  /* ── Card ── */
  .auth-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    padding: 44px 40px;
    width: 100%;
    max-width: 440px;
    text-align: center;
  }

  .auth-logo { height: auto;
    width: 90px;
    margin-bottom: 18px;
  }

  .auth-title {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--navy);
    margin-bottom: 28px;
    text-transform: uppercase;
  }

  .auth-form { text-align: left; }

  .auth-actions {
    margin-top: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .auth-links {
    font-size: .9rem;
    color: var(--text-mid);
  }
  .auth-links a {
    color: var(--teal-dark);
    font-weight: 600;
    text-decoration: underline;
  }
  .auth-links a:hover { color: var(--teal-mid); }
</style>
{% endblock %}

{% block body %}
<header class="gz-header">
  <h1>Guardian Zero</h1>
</header>

<main class="auth-page">
  <div class="auth-card">
    <!-- Logo SVG inline (ícono escudo/guardián) -->
    <img src="{{ url_for('static', filename='img/LOGO_GZ.png') }}" class="auth-logo" alt="Guardian Zero"/>

    <p class="auth-title">Inicio de Sesión</p>

    <form class="auth-form" method="POST" action="{{ url_for('auth.login') }}">
      <div class="input-group">
        <span class="icon">👤</span>
        <input type="email" name="email" placeholder="Correo Electrónico"
               required autocomplete="email" />
      </div>
      <div class="input-group">
        <span class="icon">🔒</span>
        <input type="password" name="password" placeholder="Contraseña"
               required autocomplete="current-password" />
      </div>

      <div class="auth-actions">
        <button type="submit" class="btn-primary">Ingresar</button>

        <div class="auth-links">
          <a href="{{ url_for('auth.forgot_password') }}">¿Olvidaste tu contraseña?</a>
        </div>

        <div class="auth-links">
          ¿No tienes cuenta?
          <a href="{{ url_for('auth.register') }}">Regístrate ahora</a>
        </div>
      </div>
    </form>
  </div>
</main>
{% endblock %}
